name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to existing Railway service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service 16529c78-ce6b-4e59-84ed-d139fb4a9729 \
            --environment a8bd17a5-fd7f-47b0-9fc4-08311e9632d1 \
            --detach
          echo "Deploy triggered for service 16529c78-ce6b-4e59-84ed-d139fb4a9729"
