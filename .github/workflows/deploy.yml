name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: "564a41ac-75f7-4be8-9ce2-e2dc57cfd8d0"
  ENV_ID: "a8bd17a5-fd7f-47b0-9fc4-08311e9632d1"
  SERVICE_ID: "f8a774af-4d62-4d17-9941-90bcd0580646"
  TG_TOKEN: "8428211519:AAHkiiy7iZdkvc-CMQY97zT5ERGbKoa3eh4"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Railway deploy via API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          TS=$(date +%s)
          RESPONSE=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { variableUpsert(input: { projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENV_ID\\\", serviceId: \\\"$SERVICE_ID\\\", name: \\\"DEPLOY_TS\\\", value: \\\"$TS\\\" }) }\"}")
          echo "Railway API response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"variableUpsert":true'; then
            echo "Deploy triggered successfully for service $SERVICE_ID"
          else
            echo "ERROR: Deploy trigger failed"
            exit 1
          fi

      - name: Update Telegram webhook
        run: |
          curl -s "https://api.telegram.org/bot$TG_TOKEN/setWebhook?url=https://finadvisor.sk/telegram/webhook"
          echo "Webhook updated"
