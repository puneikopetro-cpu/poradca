name: Deploy to Railway

on:
  push:
    branches: [main]

env:
  PROJECT_ID: "564a41ac-75f7-4be8-9ce2-e2dc57cfd8d0"
  ENV_ID: "a8bd17a5-fd7f-47b0-9fc4-08311e9632d1"
  CUSTOM_DOMAIN: "finadvisor.sk"
  TG_TOKEN: "8428211519:AAHkiiy7iZdkvc-CMQY97zT5ERGbKoa3eh4"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: curl -fsSL https://railway.app/install.sh | sh

      - name: Find service with finadvisor.sk and deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -e
          # Find service that has finadvisor.sk custom domain
          QUERY='{ "query": "{ project(id: \"'"$PROJECT_ID"'\") { serviceInstances { edges { node { serviceId customDomains { id domain } } } } } }" }'
          RESULT=$(curl -sf -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "$QUERY")
          echo "Service query: $RESULT"

          TARGET_SVC=$(echo "$RESULT" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          instances=d['data']['project']['serviceInstances']['edges']
          for e in instances:
            n=e['node']
            for cd in n.get('customDomains',[]):
              if cd['domain']=='$CUSTOM_DOMAIN':
                print(n['serviceId'])
                break
          " 2>/dev/null)
          echo "Service with $CUSTOM_DOMAIN: '$TARGET_SVC'"

          if [ -z "$TARGET_SVC" ]; then
            echo "WARNING: could not find service with $CUSTOM_DOMAIN — falling back to creating new service"
            RESULT=$(curl -sf -X POST "https://backboard.railway.com/graphql/v2" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -d '{"query":"mutation { githubRepoDeploy(input: { projectId: \"'"$PROJECT_ID"'\", repo: \"puneikopetro-cpu/poradca\", branch: \"main\" }) }"}')
            TARGET_SVC=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['githubRepoDeploy'])" 2>/dev/null)
            echo "Created new service: $TARGET_SVC"
            echo "IS_NEW_SERVICE=true" >> $GITHUB_ENV
          else
            echo "IS_NEW_SERVICE=false" >> $GITHUB_ENV
          fi

          echo "TARGET_SERVICE_ID=$TARGET_SVC" >> $GITHUB_ENV

      - name: Deploy code to target service via Railway CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -e
          echo "Deploying to service: $TARGET_SERVICE_ID"
          railway up \
            --service "$TARGET_SERVICE_ID" \
            --environment "$ENV_ID" \
            --detach
          echo "Deploy triggered"

      - name: Set env vars on new service (if new)
        if: env.IS_NEW_SERVICE == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          set_var() {
            local name=$1; local value=$2
            [ -z "$value" ] && return
            curl -s -X POST "https://backboard.railway.com/graphql/v2" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -d "{\"query\":\"mutation { variableUpsert(input: { projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENV_ID\\\", serviceId: \\\"$TARGET_SERVICE_ID\\\", name: \\\"$name\\\", value: \\\"$value\\\" }) }\"}" > /dev/null
          }
          set_var "SECRET_KEY" "$SECRET_KEY"
          set_var "DATABASE_URL" "$DATABASE_URL"
          set_var "STRIPE_SECRET_KEY" "$STRIPE_SECRET_KEY"
          set_var "STRIPE_PUBLISHABLE_KEY" "$STRIPE_PUBLISHABLE_KEY"
          set_var "TELEGRAM_BOT_TOKEN" "$TG_TOKEN"
          set_var "ALGORITHM" "HS256"
          set_var "ACCESS_TOKEN_EXPIRE_MINUTES" "10080"
          sleep 120
          # Move domain to new service
          ADD_RESULT=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{\"query\":\"mutation { customDomainCreate(input: { domain: \\\"$CUSTOM_DOMAIN\\\", serviceId: \\\"$TARGET_SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\" }) { id domain } }\"}")
          echo "Domain: $ADD_RESULT"
          curl -s "https://api.telegram.org/bot$TG_TOKEN/setWebhook?url=https://$CUSTOM_DOMAIN/telegram/webhook"

      - name: Update Telegram webhook (always)
        run: |
          curl -s "https://api.telegram.org/bot$TG_TOKEN/setWebhook?url=https://$CUSTOM_DOMAIN/telegram/webhook"
          echo "Webhook confirmed: https://$CUSTOM_DOMAIN/telegram/webhook"
