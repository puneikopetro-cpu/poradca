name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy new service via Railway API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # githubRepoDeploy creates new service with latest code
          RESULT=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{"query":"mutation { githubRepoDeploy(input: { projectId: \"564a41ac-75f7-4be8-9ce2-e2dc57cfd8d0\", repo: \"puneikopetro-cpu/poradca\", branch: \"main\" }) }"}')
          echo "Deploy result: $RESULT"
          NEW_SVC=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['githubRepoDeploy'])")
          echo "New service ID: $NEW_SVC"
          echo "NEW_SERVICE_ID=$NEW_SVC" >> $GITHUB_ENV

      - name: Wait for build and create domain
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          sleep 120
          # Create domain
          DOMAIN_RESULT=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{\"query\":\"mutation { serviceDomainCreate(input: { serviceId: \\\"$NEW_SERVICE_ID\\\", environmentId: \\\"a8bd17a5-fd7f-47b0-9fc4-08311e9632d1\\\" }) { domain } }\"}")
          echo "Domain: $DOMAIN_RESULT"
