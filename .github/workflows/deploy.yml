name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: "564a41ac-75f7-4be8-9ce2-e2dc57cfd8d0"
  ENV_ID: "a8bd17a5-fd7f-47b0-9fc4-08311e9632d1"
  SERVICE_ID: "f8a774af-4d62-4d17-9941-90bcd0580646"
  TG_TOKEN: "8428211519:AAHkiiy7iZdkvc-CMQY97zT5ERGbKoa3eh4"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service $SERVICE_ID --environment production --detach
          echo "Deployed to service $SERVICE_ID (intuitive-illumination / finadvisor.sk)"

      - name: Update Telegram webhook
        run: |
          curl -s "https://api.telegram.org/bot$TG_TOKEN/setWebhook?url=https://finadvisor.sk/telegram/webhook"
          echo "Webhook updated: https://finadvisor.sk/telegram/webhook"
