<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>🤡 Nič tu nie je</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3,#54a0ff);
      background-size:400% 400%;
      animation:bg 8s ease infinite;
      font-family:'Comic Sans MS',cursive,sans-serif;
      overflow:hidden;
    }
    @keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .clown{font-size:clamp(80px,20vw,180px);animation:bounce 1.5s ease-in-out infinite;cursor:default;user-select:none}
    @keyframes bounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-30px) rotate(5deg)}}
    h1{
      font-size:clamp(24px,5vw,48px);color:#fff;
      text-shadow:3px 3px 0 #e74c3c,6px 6px 0 rgba(0,0,0,.2);
      margin:20px 0 10px;text-align:center;padding:0 20px;
    }
    p{
      font-size:clamp(14px,2.5vw,22px);color:#fff;
      text-shadow:1px 1px 4px rgba(0,0,0,.3);
      text-align:center;padding:0 20px;max-width:600px;
    }
    .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1}
    .star{
      position:absolute;background:#fff;border-radius:50%;
      animation:twinkle var(--dur,2s) ease-in-out infinite;
      opacity:0;
    }
    @keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5)}50%{opacity:1;transform:scale(1)}}
    .confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
    .dot{
      position:absolute;width:10px;height:10px;border-radius:50%;
      animation:fall var(--spd,3s) linear infinite;
      top:-10px;left:var(--x,50%);background:var(--c,#fff);
    }
    @keyframes fall{0%{transform:translateY(-10px) rotate(0)}100%{transform:translateY(110vh) rotate(720deg)}}
    .msg{
      margin-top:20px;background:rgba(255,255,255,.25);
      backdrop-filter:blur(8px);border-radius:20px;padding:16px 28px;
      font-size:clamp(13px,2vw,18px);color:#fff;font-weight:bold;
      text-shadow:1px 1px 3px rgba(0,0,0,.2);border:2px solid rgba(255,255,255,.4);
      text-align:center;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="confetti-wrap" id="confetti"></div>

<div class="clown" id="clown">🤡</div>
<h1>Tu nie je nič zaujímavé!</h1>
<p>Presunuli sme sa inde. Táto stránka slúži len ako dekorácia.</p>
<div class="msg" id="msg">🎪 Vitaj v cirkuse internetu! 🎪</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.cssText=`width:${Math.random()*4+1}px;height:${Math.random()*4+1}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${Math.random()*3+1}s;animation-delay:${Math.random()*3}s`;
    starsEl.appendChild(s);
  }

  // Confetti
  const conf=document.getElementById('confetti');
  const colors=['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#1dd1a1','#ff9f43'];
  for(let i=0;i<40;i++){
    const d=document.createElement('div');
    d.className='dot';
    d.style.cssText=`--x:${Math.random()*100}%;--spd:${Math.random()*4+2}s;--c:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*4}s;width:${Math.random()*12+4}px;height:${Math.random()*12+4}px;border-radius:${Math.random()>0.5?'50%':'2px'}`;
    conf.appendChild(d);
  }

  // Rotating messages
  const msgs=[
    '🎪 Vitaj v cirkuse internetu! 🎪',
    '🤡 Tu sa nič nedeje... alebo áno? 🤡',
    '🎠 Choď si pozrieť iné stránky! 🎠',
    '🎭 Nič, čo hľadáš, tu nenájdeš! 🎭',
    '🎡 Prázdno. Tma. Kloun. 🎡',
    '🎈 Bubliny! Len bubliny! 🎈',
  ];
  let mi=0;
  setInterval(()=>{
    mi=(mi+1)%msgs.length;
    document.getElementById('msg').textContent=msgs[mi];
  },2500);

  // Click clown
  const clownEl=document.getElementById('clown');
  const sounds=['😂','🎉','💥','🌈','🔔','🎵','✨','🎊'];
  clownEl.addEventListener('click',()=>{
    const s=sounds[Math.floor(Math.random()*sounds.length)];
    const el=document.createElement('div');
    el.textContent=s;
    el.style.cssText=`position:fixed;font-size:3rem;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;pointer-events:none;animation:pop 0.6s ease forwards`;
    document.body.appendChild(el);
    const style=document.createElement('style');
    style.textContent='@keyframes pop{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}50%{opacity:1;transform:translate(-50%,-120%) scale(1.5)}100%{opacity:0;transform:translate(-50%,-200%) scale(0.5)}}';
    document.head.appendChild(style);
    setTimeout(()=>el.remove(),700);
  });
</script>
</body>
</html>
