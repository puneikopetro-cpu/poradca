<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — FinAdvisor SK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1a56db;
      --blue-d:  #1e429f;
      --blue-l:  #e8f0fe;
      --green:   #0e9f6e;
      --dark:    #111827;
      --gray:    #6b7280;
      --light:   #f9fafb;
      --white:   #ffffff;
      --radius:  12px;
      --shadow:  0 4px 24px rgba(0,0,0,.08);
    }

    body { font-family: 'Inter', sans-serif; color: var(--dark); background: var(--light); min-height: 100vh; }

    /* LOGIN PAGE */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f5ff 0%, #ffffff 60%);
      padding: 24px;
    }

    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 24px 60px rgba(26,86,219,.12);
      width: 100%;
      max-width: 420px;
      border: 1px solid #e5e7eb;
    }

    .login-logo {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--dark); }

    .login-sub {
      text-align: center;
      color: var(--gray);
      font-size: .9rem;
      margin-bottom: 32px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 13px 16px; border: 1.5px solid #e5e7eb;
      border-radius: 8px; font-size: .95rem; font-family: inherit;
      outline: none; transition: border .2s; background: var(--white);
    }
    .form-group input:focus { border-color: var(--blue); }

    .btn-login {
      width: 100%; background: var(--blue); color: #fff; border: none;
      border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    .btn-login:hover { background: var(--blue-d); }

    .login-error {
      background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px;
      color: #dc2626; padding: 10px 14px; font-size: .85rem;
      margin-bottom: 16px; display: none;
    }

    /* ADMIN DASHBOARD */
    .admin-page { display: none; }

    .admin-nav {
      background: var(--white);
      border-bottom: 1px solid #e5e7eb;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .admin-logo { font-size: 1.2rem; font-weight: 800; color: var(--blue); }
    .admin-logo span { color: var(--dark); }
    .admin-badge { background: var(--blue-l); color: var(--blue); font-size: .75rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; margin-left: 10px; }

    .btn-logout {
      background: transparent; border: 1.5px solid #e5e7eb; color: var(--gray);
      padding: 8px 18px; border-radius: 8px; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

    .admin-content { max-width: 1200px; margin: 0 auto; padding: 32px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px 28px;
      border: 1px solid #e5e7eb;
      box-shadow: var(--shadow);
    }

    .stat-card .label { font-size: .8rem; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .stat-card .value { font-size: 2rem; font-weight: 800; color: var(--dark); }
    .stat-card .sub { font-size: .8rem; color: var(--gray); margin-top: 4px; }

    .table-wrap {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid #e5e7eb;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .table-header h2 { font-size: 1.1rem; font-weight: 700; }

    .btn-refresh {
      background: var(--blue-l); color: var(--blue); border: none;
      padding: 8px 16px; border-radius: 8px; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn-refresh:hover { background: #c7d7fd; }

    .leads-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }

    .leads-table th {
      background: var(--light);
      padding: 12px 16px;
      text-align: left;
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--gray);
      border-bottom: 1px solid #e5e7eb;
    }

    .leads-table td {
      padding: 14px 16px;
      border-bottom: 1px solid #f3f4f6;
      vertical-align: top;
    }

    .leads-table tr:last-child td { border-bottom: none; }
    .leads-table tr:hover td { background: #fafbff; }

    .leads-table td.name { font-weight: 600; color: var(--dark); }
    .leads-table td.email a { color: var(--blue); text-decoration: none; }
    .leads-table td.email a:hover { text-decoration: underline; }

    .interest-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      background: var(--blue-l);
      color: var(--blue);
    }

    .source-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
    }
    .source-website { background: #d1fae5; color: #065f46; }
    .source-telegram { background: #dbeafe; color: #1e40af; }
    .source-other { background: #f3f4f6; color: #374151; }

    .date-col { color: var(--gray); font-size: .82rem; white-space: nowrap; }
    .msg-col { color: var(--gray); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .loading {
      text-align: center;
      padding: 60px 24px;
      color: var(--gray);
    }

    .loading-spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid var(--blue-l);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--gray);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: .95rem; }

    .error-state {
      text-align: center;
      padding: 40px 24px;
      color: #dc2626;
      background: #fef2f2;
    }

    @media (max-width: 768px) {
      .admin-content { padding: 16px; }
      .leads-table th:nth-child(5),
      .leads-table td:nth-child(5),
      .leads-table th:nth-child(6),
      .leads-table td:nth-child(6) { display: none; }
    }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page" class="login-page">
  <div class="login-card">
    <div class="login-logo">Fin<span>Advisor</span> SK</div>
    <div class="login-sub">Admin Panel — Prihlasenie</div>
    <div class="login-error" id="login-error">Nespravne heslo. Skuste znova.</div>
    <form id="login-form">
      <div class="form-group">
        <label for="password">Heslo</label>
        <input type="password" id="password" placeholder="Zadajte adminove heslo..." autofocus />
      </div>
      <button type="submit" class="btn-login">Prihlasit sa</button>
    </form>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-page" class="admin-page">
  <nav class="admin-nav">
    <div style="display:flex;align-items:center;">
      <div class="admin-logo">Fin<span>Advisor</span> SK</div>
      <span class="admin-badge">Admin</span>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="lead-count-nav" style="font-size:.85rem;color:var(--gray);"></span>
      <button class="btn-logout" onclick="logout()">Odhlasit sa</button>
    </div>
  </nav>

  <div class="admin-content">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Celkovo leadov</div>
        <div class="value" id="stat-total">—</div>
        <div class="sub">od spustenia stranky</div>
      </div>
      <div class="stat-card">
        <div class="label">Dnes</div>
        <div class="value" id="stat-today">—</div>
        <div class="sub">novych zaznamov</div>
      </div>
      <div class="stat-card">
        <div class="label">Z webu</div>
        <div class="value" id="stat-web">—</div>
        <div class="sub">zo stranky finadvisor.sk</div>
      </div>
      <div class="stat-card">
        <div class="label">Z Telegramu</div>
        <div class="value" id="stat-tg">—</div>
        <div class="sub">cez @finadvisor_sk_bot</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-header">
        <h2>Vsetky leady</h2>
        <button class="btn-refresh" onclick="loadLeads()">Obnovit</button>
      </div>
      <div id="table-body">
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>Nacitavam data...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const ADMIN_PASSWORD = "finadvisor2024";
  const API = "";  // same origin

  function isLoggedIn() {
    return localStorage.getItem("admin_auth") === "true";
  }

  function login(pw) {
    if (pw === ADMIN_PASSWORD) {
      localStorage.setItem("admin_auth", "true");
      showAdmin();
    } else {
      document.getElementById("login-error").style.display = "block";
    }
  }

  function logout() {
    localStorage.removeItem("admin_auth");
    location.reload();
  }

  function showAdmin() {
    document.getElementById("login-page").style.display = "none";
    document.getElementById("admin-page").style.display = "block";
    loadLeads();
  }

  document.getElementById("login-form").addEventListener("submit", function(e) {
    e.preventDefault();
    login(document.getElementById("password").value);
  });

  function formatDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleDateString("sk-SK") + " " + d.toLocaleTimeString("sk-SK", {hour:"2-digit",minute:"2-digit"});
  }

  function interestLabel(val) {
    const m = {
      investment: "Investovanie", mortgage: "Hypoteka",
      insurance: "Poistenie", tax: "Dane", planning: "Planovanie", other: "Ine"
    };
    return m[val] || val;
  }

  async function loadLeads() {
    const tbody = document.getElementById("table-body");
    tbody.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Nacitavam leady...</p></div>';

    // Need JWT token to access /leads — try anon request, fall back to error
    const token = localStorage.getItem("admin_token");
    const headers = token ? { "Authorization": "Bearer " + token } : {};

    try {
      const res = await fetch(API + "/leads", { headers });

      if (res.status === 401) {
        // Try to get a token via demo login
        tbody.innerHTML = '<div class="error-state"><b>Prihlasenie do API zlyhalo.</b><br/>Nastavte SMTP prihlasovacie udaje v Railway env alebo vytvorte admin ucet.</div>';
        // Show leads without auth fallback
        await loadLeadsNoAuth(tbody);
        return;
      }

      if (!res.ok) throw new Error("HTTP " + res.status);
      const leads = await res.json();
      renderLeads(leads, tbody);
    } catch(err) {
      tbody.innerHTML = `<div class="error-state">Chyba pri nacitavani: ${err.message}</div>`;
    }
  }

  async function loadLeadsNoAuth(tbody) {
    // Try to authenticate with a stored token
    const storedToken = localStorage.getItem("admin_api_token");
    if (storedToken) {
      try {
        const res = await fetch(API + "/leads", {
          headers: { "Authorization": "Bearer " + storedToken }
        });
        if (res.ok) {
          const leads = await res.json();
          renderLeads(leads, tbody);
          return;
        }
      } catch(e) {}
    }
    tbody.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔐</div>
        <p><b>API prihlasenie potrebne</b></p>
        <p style="margin-top:8px;font-size:.85rem;">Zadajte API Bearer token pre zobrazenie leadov:</p>
        <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
          <input id="api-token-input" type="text" placeholder="Bearer token z /auth/login" style="padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.9rem;min-width:280px;outline:none;" />
          <button onclick="saveToken()" style="background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:700;cursor:pointer;font-size:.9rem;">Ulozit a nacitat</button>
        </div>
      </div>
    `;
  }

  function saveToken() {
    const t = document.getElementById("api-token-input").value.trim();
    if (t) {
      localStorage.setItem("admin_api_token", t);
      loadLeads();
    }
  }

  function renderLeads(leads, tbody) {
    // Update stats
    const today = new Date().toDateString();
    const todayCount = leads.filter(l => new Date(l.created_at).toDateString() === today).length;
    const webCount = leads.filter(l => l.source === "website").length;
    const tgCount = leads.filter(l => l.source === "telegram").length;

    document.getElementById("stat-total").textContent = leads.length;
    document.getElementById("stat-today").textContent = todayCount;
    document.getElementById("stat-web").textContent = webCount;
    document.getElementById("stat-tg").textContent = tgCount;
    document.getElementById("lead-count-nav").textContent = leads.length + " leadov";

    if (leads.length === 0) {
      tbody.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>Zatial ziadne leady. Formulare na stranke este neboli vyplnene.</p>
        </div>
      `;
      return;
    }

    const rows = leads.map(l => `
      <tr>
        <td class="name">${escHtml(l.full_name)}</td>
        <td class="email"><a href="mailto:${escHtml(l.email)}">${escHtml(l.email)}</a></td>
        <td>${l.phone ? escHtml(l.phone) : '<span style="color:var(--gray)">—</span>'}</td>
        <td><span class="interest-badge">${interestLabel(l.interest)}</span></td>
        <td><span class="source-badge source-${l.source === 'website' ? 'website' : l.source === 'telegram' ? 'telegram' : 'other'}">${escHtml(l.source)}</span></td>
        <td class="msg-col" title="${escHtml(l.message || '')}">${l.message ? escHtml(l.message) : '<span style="color:var(--gray)">—</span>'}</td>
        <td class="date-col">${formatDate(l.created_at)}</td>
      </tr>
    `).join("");

    tbody.innerHTML = `
      <table class="leads-table">
        <thead>
          <tr>
            <th>Meno</th>
            <th>Email</th>
            <th>Telefon</th>
            <th>Oblast</th>
            <th>Zdroj</th>
            <th>Sprava</th>
            <th>Datum</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function escHtml(s) {
    if (!s) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Init
  if (isLoggedIn()) {
    showAdmin();
  }
</script>
</body>
</html>
